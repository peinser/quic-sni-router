name: Image
run-name: ${{ github.actor }} is building a new quic-sni-router image

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - development
    paths:
    - docker/**
    - .dockerignore
    - .github/workflows/image.yaml
    - CMakeLists.txt
    - Makefile
    - include/**
    - src/**
    - tests/**

env:
  IMAGE: ${{ vars.OCI_REGISTRY }}/library/quic-sni-router

jobs:
  prepare:
    runs-on:
      group: on-prem
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Determine image version
      id: version
      run: |
        version="$(awk '/VERSION/ && /quic-sni-router/ { print $3; exit }' CMakeLists.txt)"
        short_sha="$(git rev-parse --short HEAD)"
        echo "tag=${version}-${short_sha}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          arch: amd64
        - platform: linux/arm64
          arch: arm64
    # Both legs run on the same on-prem group (amd64 hardware). The arm64
    # leg cross-builds under QEMU; legs run in parallel on separate runners,
    # so wall-clock is max(amd64, arm64) instead of sum.
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6

    - name: Authenticate with the remote Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ vars.OCI_REGISTRY }}
        username: ${{ secrets.OCI_REGISTRY_HARBOR_LOGIN }}
        password: ${{ secrets.OCI_REGISTRY_HARBOR_SECRET }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          image=harbor.peinser.com/dockerhub/moby/buildkit:buildx-stable-1

    - name: Validate CPU target
      env:
        QSR_CPU_TARGET: ${{ vars.QSR_CPU_TARGET }}
      run: |
        if [ "${QSR_CPU_TARGET}" = "native" ]; then
          echo "QSR_CPU_TARGET=native is not allowed for published multi-arch images" >&2
          exit 1
        fi
        if [ -n "${QSR_CPU_TARGET}" ] && [ "${{ matrix.arch }}" != "amd64" ]; then
          echo "QSR_CPU_TARGET=${QSR_CPU_TARGET} is not valid for ${{ matrix.arch }} image builds" >&2
          exit 1
        fi

    - name: Build and push release by digest
      id: build_release
      uses: docker/build-push-action@v7
      with:
        context: .
        file: docker/Dockerfile
        target: production
        platforms: ${{ matrix.platform }}
        push: true
        provenance: false
        build-args: |
          VERSION=${{ needs.prepare.outputs.tag }}
          REVISION=${{ github.sha }}
          CREATED=${{ github.event.repository.updated_at }}
          QSR_CPU_TARGET=${{ vars.QSR_CPU_TARGET }}
          QSR_ENABLE_LTO=${{ vars.QSR_ENABLE_LTO || 'OFF' }}
          QSR_ENABLE_PACKET_DEBUG=OFF
        # push-by-digest: emit a single-platform image keyed only by content
        # hash; the merge job below stitches per-arch digests into the tagged
        # multi-arch manifest. name-canonical=true keeps each per-arch image
        # discoverable in Harbor under the canonical name.
        outputs: |
          type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
        # Per-platform cache refs avoid the two legs trampling each other and
        # keep each arch's cache focused (arm64 cache otherwise stays cold
        # because amd64 layers don't apply). The following debug build runs in
        # this same BuildKit builder, so package/dependency layers are reused
        # locally instead of rebuilt in a separate matrix job.
        cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }}
        cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }},mode=max

    - name: Build and push debug by digest
      id: build_debug
      uses: docker/build-push-action@v7
      with:
        context: .
        file: docker/Dockerfile
        target: production
        platforms: ${{ matrix.platform }}
        push: true
        provenance: false
        build-args: |
          VERSION=${{ needs.prepare.outputs.tag }}-debug
          REVISION=${{ github.sha }}
          CREATED=${{ github.event.repository.updated_at }}
          QSR_CPU_TARGET=${{ vars.QSR_CPU_TARGET }}
          QSR_ENABLE_LTO=${{ vars.QSR_ENABLE_LTO || 'OFF' }}
          QSR_ENABLE_PACKET_DEBUG=ON
        outputs: |
          type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
        cache-from: |
          type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }}
          type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }}-debug
        cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.arch }}-debug,mode=max

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        # Strip the "sha256:" prefix; the file name is the bare hex digest.
        release_digest="${{ steps.build_release.outputs.digest }}"
        debug_digest="${{ steps.build_debug.outputs.digest }}"
        echo "${release_digest}" > "/tmp/digests/release-${release_digest#sha256:}"
        echo "${debug_digest}" > "/tmp/digests/debug-${debug_digest#sha256:}"

    - name: Upload digest artifact
      uses: actions/upload-artifact@v4
      with:
        name: digest-${{ matrix.arch }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on:
      group: on-prem
    steps:
    - name: Download all digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digest-*
        merge-multiple: true

    - name: Authenticate with the remote Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ vars.OCI_REGISTRY }}
        username: ${{ secrets.OCI_REGISTRY_HARBOR_LOGIN }}
        password: ${{ secrets.OCI_REGISTRY_HARBOR_SECRET }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          image=harbor.peinser.com/dockerhub/moby/buildkit:buildx-stable-1

    - name: Create multi-arch manifests
      working-directory: /tmp/digests
      run: |
        # imagetools create accepts a list of per-arch refs of the form
        # <image>@sha256:<digest> and produces a single multi-arch manifest at
        # each -t tag. The debug tag is Release-equivalent except packet
        # decision logging is compiled in and still gated by QSR_DEBUG_PACKETS.
        release_sources=()
        for f in release-*; do
          release_sources+=("${{ env.IMAGE }}@sha256:${f#release-}")
        done
        debug_sources=()
        for f in debug-*; do
          debug_sources+=("${{ env.IMAGE }}@sha256:${f#debug-}")
        done
        docker buildx imagetools create -t "${{ env.IMAGE }}:${{ needs.prepare.outputs.tag }}" "${release_sources[@]}"
        docker buildx imagetools create -t "${{ env.IMAGE }}:${{ needs.prepare.outputs.tag }}-debug" "${debug_sources[@]}"

    - name: Inspect resulting manifest
      run: |
        docker buildx imagetools inspect "${{ env.IMAGE }}:${{ needs.prepare.outputs.tag }}"
        docker buildx imagetools inspect "${{ env.IMAGE }}:${{ needs.prepare.outputs.tag }}-debug"
