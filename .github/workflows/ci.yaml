name: CI
run-name: ${{ github.actor }} is validating quic-sni-router

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - development
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Setup dependencies
      uses: ./.github/actions/setup-deps
      with:
        extras: clang gcc cppcheck clang-tidy
    - name: Configure
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=${{ matrix.compiler }}
    - name: Build
      run: cmake --build build
    - name: Test
      run: ctest --test-dir build --output-on-failure

  sanitize:
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Setup dependencies
      uses: ./.github/actions/setup-deps
      with:
        extras: clang-18 libclang-rt-18-dev
    - name: Sanitize
      run: make sanitize CLANG=clang-18

  fuzz-smoke:
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Setup dependencies
      uses: ./.github/actions/setup-deps
      with:
        extras: clang-18 libclang-rt-18-dev
    - name: Fuzz smoke
      run: make fuzz-smoke CLANG=clang-18

  docker-e2e:
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Authenticate with the remote Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ vars.OCI_REGISTRY }}
        username: ${{ secrets.OCI_REGISTRY_HARBOR_LOGIN }}
        password: ${{ secrets.OCI_REGISTRY_HARBOR_SECRET }}
    - name: Docker HTTP/3 e2e
      run: make test-e2e
    - name: Docker fragmented-Initial e2e
      run: make test-e2e-fragmented
    - name: Docker backend-idle e2e
      run: make test-e2e-idle
    - name: Docker reverse-tuple e2e
      run: make test-e2e-reverse
    - name: Docker hot-reload e2e
      run: make test-e2e-reload

  loadtest:
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Authenticate with the remote Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ vars.OCI_REGISTRY }}
        username: ${{ secrets.OCI_REGISTRY_HARBOR_LOGIN }}
        password: ${{ secrets.OCI_REGISTRY_HARBOR_SECRET }}
    - name: Docker loadtest (10 backends, sustained concurrent QUIC)
      # Correctness-under-load: 10 aioquic backends, 10 concurrent workers
      # for 30s of fresh handshakes each. Pass requires zero misrouted
      # responses AND success rate >= 95%. Tune via env vars.
      run: make test-loadtest
    - name: Docker persistent-session loadtest
      # Established-session forwarding: each worker keeps one QUIC/HTTP/3
      # connection open and sends repeated requests on new streams.
      run: QSR_LOADTEST_PERSISTENT=1 make test-loadtest

  static-analysis:
    runs-on:
      group: on-prem
    steps:
    - name: Git Checkout
      uses: actions/checkout@v6
    - name: Setup dependencies
      uses: ./.github/actions/setup-deps
      with:
        extras: clang clang-tidy cppcheck
    - name: Lint
      run: make lint
